global:
  resolve_timeout: 5m
  smtp_from: 'alerts@supervisorvisits.com'
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_auth_username: 'alerts@supervisorvisits.com'
  smtp_auth_password: 'your_smtp_password'

route:
  group_by: ['alertname', 'cluster']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
    - match:
        severity: warning
      receiver: 'warning-alerts'

receivers:
  - name: 'default'
    email_configs:
      - to: 'team@supervisorvisits.com'
        send_resolved: true

  - name: 'critical-alerts'
    email_configs:
      - to: 'oncall@supervisorvisits.com'
        send_resolved: true
    pagerduty_configs: []

  - name: 'warning-alerts'
    email_configs:
      - to: 'team@supervisorvisits.com'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
