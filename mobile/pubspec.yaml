name: supervisor_visit
description: Supervisor Visit Management Mobile App
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.4

  # Navigation
  go_router: ^13.2.0

  # HTTP & API
  dio: ^5.4.3
  retrofit: ^4.1.0

  # Local Storage & Offline
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  connectivity_plus: ^6.0.2

  # GPS & Maps
  geolocator: ^11.0.0
  google_maps_flutter: ^2.5.3
  geocoding: ^3.0.0

  # QR Code
  mobile_scanner: ^4.0.1
  qr_flutter: ^4.1.0

  # Camera & Image
  image_picker: ^1.0.7
  camera: ^0.10.5+9
  flutter_image_compress: ^2.1.0

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  fl_chart: ^0.67.0

  # Utilities
  intl: ^0.19.0
  logger: ^2.2.0
  package_info_plus: ^7.0.0
  permission_handler: ^11.3.0
  uuid: ^4.3.3
  crypto: ^3.0.3
  jwt_decoder: ^2.0.1

  # Notifications
  firebase_core: ^2.27.1
  firebase_messaging: ^14.7.20
  flutter_local_notifications: ^17.0.0

  # File & Upload
  http_parser: ^4.0.2
  mime: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.11
  retrofit_generator: ^8.1.0
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
